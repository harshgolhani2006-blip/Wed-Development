<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:rgb(30,30,89);

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:500px;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:rgb(21,21,202);
}

.top-box{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.box{
    flex:1;
    background:rgb(107,107,145);
    color:white;
    text-align:center;
    padding:10px;
    border-radius:8px;
}

.q{
    margin-top:20px;
    color:gray;
}

#question{
    margin-top:10px;
    color:#333;
}

.option{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
    background:#f1f1f1;
    transition:0.3s;
}

.option:hover{
    background:rgb(107,107,145);
    color:white;
}

.correct{
    background:green !important;
    color:white;
}

.wrong{
    background:red !important;
    color:white;
}

#next-btn,
#restart-btn{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:6px;
    background:rgb(21,21,202);
    color:white;
    font-size:16px;
    cursor:pointer;
}

#next-btn:hover,
#restart-btn:hover{
    background:rgb(8,8,150);
}

.hide{
    display:none;
}

#resultScreen{
    text-align:center;
}

#finalScore{
    font-size:35px;
    color:green;
    margin:20px 0;
}

#resultMsg{
    font-size:18px;
    color:#333;
}

</style>
</head>

<body>

<div class="container">

    <!-- Quiz Screen -->
    <div id="quizScreen">

        <h1>🧠 Quiz Time!</h1>

        <div class="top-box">

            <div class="box">
                <h3 id="score">Score: 0</h3>
            </div>

            <div class="box">
                <h3 id="timer">⏳ 30s</h3>
            </div>

        </div>

        <p class="q" id="question-count">
            Question 1 of 5
        </p>

        <h2 id="question"></h2>

        <div id="options"></div>

        <button id="next-btn">
            Next Question
        </button>

    </div>

    <!-- Result Screen -->
    <div id="resultScreen" class="hide">

        <h1>🎉 Quiz Finished</h1>

        <h2>Your Score</h2>

        <div id="finalScore">0 / 5</div>

        <p id="resultMsg"></p>

        <button id="restart-btn">
            Restart Quiz
        </button>

    </div>

</div>

<script>

const questions = [

{
    question:"HTML ka full form kya hai?",
    options:[
        "Hyper Text Markup Language",
        "High Text Machine Language",
        "Hyper Tabular Markup Language",
        "Home Tool Markup Language"
    ],
    answer:0
},

{
    question:"CSS me color change karne ke liye kaunsi property use hoti hai?",
    options:[
        "font-color",
        "text-color",
        "color",
        "background"
    ],
    answer:2
},

{
    question:"JavaScript me variable declare karne ke liye kaunsa keyword use hota hai?",
    options:[
        "var",
        "int",
        "string",
        "declare"
    ],
    answer:0
},

{
    question:"Kaunsa HTML tag sabse bada heading banata hai?",
    options:[
        "<h6>",
        "<heading>",
        "<h1>",
        "<head>"
    ],
    answer:2
},

{
    question:"JavaScript me array ki length kaise pata karte hain?",
    options:[
        "array.size()",
        "array.length",
        "array.count",
        "length(array)"
    ],
    answer:1
}

];

let currentQuestion = 0;
let score = 0;
let timeLeft = 30;
let timer;
let answered = false;

loadQuestion();

function loadQuestion(){

    answered = false;
    timeLeft = 30;

    document.getElementById("timer").textContent =
    `⏳ ${timeLeft}s`;

    const q = questions[currentQuestion];

    document.getElementById("question-count").textContent =
    `Question ${currentQuestion + 1} of ${questions.length}`;

    document.getElementById("question").textContent =
    q.question;

    const optionsDiv =
    document.getElementById("options");

    optionsDiv.innerHTML = "";

    q.options.forEach((option,index)=>{

        const btn = document.createElement("button");

        btn.classList.add("option");

        btn.textContent = option;

        btn.onclick = () => checkAnswer(index,btn);

        optionsDiv.appendChild(btn);

    });

    document.getElementById("next-btn").disabled = true;

    startTimer();
}

function startTimer(){

    clearInterval(timer);

    timer = setInterval(()=>{

        timeLeft--;

        document.getElementById("timer").textContent =
        `⏳ ${timeLeft}s`;

        if(timeLeft <= 0){

            clearInterval(timer);

            timeUp();
        }

    },1000);
}

function checkAnswer(selected,btn){

    if(answered) return;

    answered = true;

    clearInterval(timer);

    const correct =
    questions[currentQuestion].answer;

    const allOptions =
    document.querySelectorAll(".option");

    allOptions.forEach(option=>{
        option.disabled = true;
    });

    if(selected === correct){

        btn.classList.add("correct");

        score++;

        document.getElementById("score").textContent =
        `Score: ${score}`;

    }else{

        btn.classList.add("wrong");

        allOptions[correct]
        .classList.add("correct");
    }

    document.getElementById("next-btn").disabled = false;
}

function timeUp(){

    answered = true;

    const correct =
    questions[currentQuestion].answer;

    const allOptions =
    document.querySelectorAll(".option");

    allOptions.forEach(option=>{
        option.disabled = true;
    });

    allOptions[correct]
    .classList.add("correct");

    document.getElementById("next-btn").disabled = false;
}

document.getElementById("next-btn")
.onclick = function(){

    currentQuestion++;

    if(currentQuestion < questions.length){

        loadQuestion();

    }else{

        showResult();
    }
};

function showResult(){

    document.getElementById("quizScreen")
    .classList.add("hide");

    document.getElementById("resultScreen")
    .classList.remove("hide");

    document.getElementById("finalScore")
    .textContent =
    `${score} / ${questions.length}`;

    let msg = "";

    let percent =
    (score / questions.length) * 100;

    if(percent === 100){

        msg = "🏆 Perfect Score!";

    }else if(percent >= 60){

        msg = "👏 Great Job!";

    }else if(percent >= 40){

        msg = "💪 Good Try!";

    }else{

        msg = "📚 Practice More!";
    }

    document.getElementById("resultMsg")
    .textContent = msg;
}

document.getElementById("restart-btn")
.onclick = restartQuiz;

function restartQuiz(){

    currentQuestion = 0;
    score = 0;

    document.getElementById("score")
    .textContent = `Score: 0`;

    document.getElementById("resultScreen")
    .classList.add("hide");

    document.getElementById("quizScreen")
    .classList.remove("hide");

    loadQuestion();
}

</script>

</body>
</html>
