<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musical Player App</title>
</head>
<body>
    <main class="card" role="main" aria-labelledby="tittle">
        <header class="top">
            <div>
                <h1 id="tittle">Day 20 : Musical Player App</h1>
                <p class="lead">Mini music player demonstration the Audio API, event listeners and state management.</p>
            </div>
        </header>

        <section class="player">
            <div class="now-playing">
                <img id="cover" class="cover" src="https:/picsum.photos/300?random=10" alt="Album art"/>
                <div class="meta">
                    <div id="trackTittle" class="tittle">Track Title</div>
                    <div id="trackArtist" class="artist">Artist</div>

                    <div class="progress-wrap" aria-label="Track progress">
                        <div id="progressContainer" class="progress-container" role="slider" tabindex="0" aria-valuemin="0" aria-valuemax="100" ariavaluenow="0"></div>
                        <div id="progress" class="progress"></div>
                    </div>
                    <div class="time-row">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>
                 
                <div class="controls">
                    <button id="prevBtn" class="btn" title="Previous(Arrow Left)">⏮</button>
                    <button id="playBtn" class="btn" title="Play/Pause(Space)">▶</button>
                    <button id="nextBtn" class="btn" title="Next(Arrow Right)">⏭</button>

                    <button id="ShuffleBtn" class="btn" title="Shuffle">🔀</button>
                    <button id="repeatBtn" class="btn" title="Repeat">🔁</button>

                    <div class="vol">
                        <button id="muteBtn" class="btn" title="Mute">🔇</button>
                        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.8" aria-label="Volume"/>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
