<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Payment</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="payment-section">

    <div class="payment-container">

        <h1>Complete Your Donation</h1>

        <div class="amount-box">
            <h3>Donation Amount</h3>
            <h2 id="amountDisplay"></h2>
        </div>

        <form id="paymentForm" class="payment-form">

            <input
                type="text"
                placeholder="Full Name"
                required
            >

            <input
                type="email"
                placeholder="Email Address"
                required
            >

            <input
                type="text"
                placeholder="Card Number"
                required
            >

            <button
                class="pay-btn"
                type="submit"
            >
                Donate Securely
            </button>

        </form>

        <p class="secure-text">
            🔒 Your donation is secure and encrypted
        </p>

    </div>

</section>

<script>

const amount =
localStorage.getItem("donationAmount") || "0";

document.getElementById(
"amountDisplay"
).innerText =
`Donation Amount: ₹${amount}`;

document.getElementById(
"paymentForm"
).addEventListener(
"submit",
async function(e){

e.preventDefault();

const data = {

name:
document.querySelector(
'input[type="text"]'
).value,

email:
document.querySelector(
'input[type="email"]'
).value,

transactionId:
"TXN" + Date.now(),

amount: amount

};

try{

const response =
await fetch(
"https://wed-development-aim4.onrender.com/api/donate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
}
);

const result =
await response.json();

alert(
result.message ||
"Donation Successful!"
);

localStorage.removeItem(
"donationAmount"
);

window.location.href =
"index.html";

}catch(error){

console.error(error);

alert(
"Unable to process donation. Please try again."
);

}

});

</script>

</body>
</html>
