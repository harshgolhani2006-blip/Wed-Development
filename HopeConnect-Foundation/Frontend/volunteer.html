<section class="hero" style="min-height:60vh;">
<div class="hero-content">
<h1>Become A Volunteer</h1>
<p>Join our mission and create meaningful impact in communities.</p>
</div>
</section>

<section class="section">
<div class="container">

<div class="section-title">
<h2>Volunteer Registration</h2>
<p>Fill out the form below and become part of our growing volunteer network.</p>
</div>

<form id="volunteerForm">

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email Address" required>

<input type="tel" placeholder="Phone Number" required>

<select required>
<option value="">Select Area of Interest</option>
<option>Education</option>
<option>Healthcare</option>
<option>Women Empowerment</option>
<option>Environment</option>
<option>Fundraising</option>
</select>

<textarea rows="5" placeholder="Tell us about yourself"></textarea>

<button class="btn primary-btn" type="submit">
Register As Volunteer
</button>

</form>

</div>
</section>

<footer class="footer">
<div class="container">
<p style="text-align:center;">© 2026 HopeConnect Foundation</p>
</div>
</footer>
