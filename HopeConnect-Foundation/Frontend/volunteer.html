<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<header class="header">
<div class="logo"><i class="fa-solid fa-hand-holding-heart"></i> HopeConnect</div>

<nav class="navbar">
<ul>
<li><a href="index.html">Home</a></li>

</header>

<section class="hero" style="min-height:60vh;">
<div class="hero-content">
<h1>Become A Volunteer</h1>
<p>Join our mission and create meaningful impact in communities.</p>
</div>
</section>

<section class="section">
<div class="container">

<div class="section-title">
<h2>Volunteer Registration</h2>
<p>Fill out the form below and become part of our growing volunteer network.</p>
</div>

<form id="volunteerForm">

    <input
        type="text"
        id="name"
        name="name"
        placeholder="Full Name"
        required
    >

    <input
        type="email"
        id="email"
        name="email"
        placeholder="Email Address"
        required
    >

    <input
        type="tel"
        id="phone"
        name="phone"
        placeholder="Phone Number"
        required
    >

    <select
        id="interest"
        name="interest"
        required
    >
        <option value="">Select Area of Interest</option>
        <option value="Education">Education</option>
        <option value="Healthcare">Healthcare</option>
        <option value="Women Empowerment">Women Empowerment</option>
        <option value="Environment">Environment</option>
        <option value="Fundraising">Fundraising</option>
    </select>

    <textarea
        id="message"
        name="message"
        rows="5"
        placeholder="Tell us about yourself"
    ></textarea>

    <button class="btn primary-btn" type="submit">
        Register As Volunteer
    </button>

    <p id="status"></p>

</form>

</div>
</section>

<footer class="footer">
<div class="container">
<p style="text-align:center;">© 2026 HopeConnect Foundation</p>
</div>
</footer>

<script src="script.js"></script>
</body>
</html>
